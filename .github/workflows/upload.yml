name: AI YouTube Auto Upload

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST (UTC+5:30 = 1:30 AM UTC)
    - cron: '30 13 * * *'  # 7:00 PM IST (1:30 PM UTC)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to files
        run: |
          echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json
          printf 'GROQ_API_KEY=%s\n' '${{ secrets.GROQ_API_KEY }}' > .env
          mkdir -p output/videos output/images output/audio output/stories output/thumbnails logs assets/music assets/fonts assets/sfx

      - name: Generate and upload video
        run: python main.py --facts --privacy public

      - name: Save used_topics and used_titles (so topics dont repeat next run)
        uses: actions/upload-artifact@v4
        with:
          name: used-data
          path: |
            output/used_titles.json
            output/used_topics.json
          retention-days: 30
        if: always()
