name: AI YouTube Auto Upload

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST daily (2:30 AM UTC)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to files
        run: |
          echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_B64 }}' | base64 -d > youtube_token.json
          printf 'GROQ_API_KEY=%s\n' '${{ secrets.GROQ_API_KEY }}' > .env
          mkdir -p output/videos output/images output/audio output/stories output/thumbnails logs assets/music assets/fonts assets/sfx

      - name: Generate and upload 2 videos
        run: python main.py --skit --count 2 --privacy public

      - name: Save used topics to repo (prevents repetition)
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/used_titles.json output/used_topics.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update used topics [skip ci]"
          git push || true
